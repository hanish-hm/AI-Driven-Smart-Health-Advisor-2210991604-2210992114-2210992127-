services:
  - type: web
    name: smart-health-advisor
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
